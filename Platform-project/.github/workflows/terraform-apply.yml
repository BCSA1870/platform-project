name: Terraform Apply
 
on:
  push:
    branches: [main]
    paths:
      - 'environments/**'
      - 'modules/**'
 
permissions:
  contents: read
 
jobs:
  apply:
    name: Apply — dev
    runs-on: ubuntu-latest
    environment: production   # requires manual approval in GitHub if configured
 
    defaults:
      run:
        working-directory: environments/dev
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     DOLLAR{{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: DOLLAR{{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            DOLLAR{{ secrets.AWS_REGION }}
 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
 
      - name: Terraform Init
        run: |
          terraform init
            -backend-config="bucket=DOLLAR{{ secrets.TF_STATE_BUCKET }}"
            -backend-config="key=dev/terraform.tfstate"
            -backend-config="region=DOLLAR{{ secrets.AWS_REGION }}"
            -backend-config="dynamodb_table=DOLLAR{{ secrets.TF_LOCK_TABLE }}"
 
      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_image: DOLLAR{{ secrets.ECR_IMAGE_URL }}
 
      - name: Get ALB URL
        run: terraform output alb_dns
